name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-sanity:
    name: Docs sanity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check whitespace / patch safety
        run: git diff --check

      - name: Markdown local link sanity
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');

          function walk(dir, acc = []) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              if (entry.name === '.git') continue;
              const p = path.join(dir, entry.name);
              if (entry.isDirectory()) walk(p, acc);
              else if (entry.isFile() && p.endsWith('.md')) acc.push(path.normalize(p));
            }
            return acc;
          }

          function slug(text) {
            return text
              .toLowerCase()
              .trim()
              .replace(/[\u2018\u2019']/g, '')
              .replace(/[^\w\s-]/g, '')
              .replace(/\s+/g, '-')
              .replace(/-+/g, '-');
          }

          const files = walk('.');
          const headingIndex = new Map();

          for (const file of files) {
            const set = new Set();
            const lines = fs.readFileSync(file, 'utf8').split(/\r?\n/);
            for (const line of lines) {
              const m = line.match(/^(#{1,6})\s+(.*)$/);
              if (m) set.add(slug(m[2]));
            }
            headingIndex.set(file, set);
          }

          const linkRe = /\[[^\]]+\]\(([^)]+)\)/g;
          const broken = [];

          for (const file of files) {
            const text = fs.readFileSync(file, 'utf8');
            let match;
            while ((match = linkRe.exec(text))) {
              let href = match[1].trim();
              if (!href || /^(https?:|mailto:|data:)/.test(href)) continue;

              let targetFile = file;
              let anchor = '';

              if (href.startsWith('#')) {
                anchor = href.slice(1);
              } else {
                const [target, maybeAnchor] = href.split('#');
                targetFile = path.normalize(path.join(path.dirname(file), target));
                anchor = maybeAnchor || '';

                if (!fs.existsSync(targetFile)) {
                  broken.push(`${file}: missing file for link ${href}`);
                  continue;
                }
              }

              if (anchor) {
                const headings = headingIndex.get(targetFile);
                if (!headings || !headings.has(slug(anchor))) {
                  broken.push(`${file}: missing anchor for link ${href}`);
                }
              }
            }
          }

          if (broken.length) {
            console.error('Markdown link sanity failed:');
            for (const b of broken) console.error(`- ${b}`);
            process.exit(1);
          }

          console.log('Markdown link sanity passed.');
          NODE
